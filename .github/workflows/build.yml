name: Build Cloudstream plugins

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Compiles every provider module into a .cs3 file and generates repo.json
      - name: Build plugins
        run: ./gradlew make makePluginsJson

      # plugins.json lands in ./build/, but each module's .cs3 lands in
      # ./<ModuleName>/build/ - gather everything into one flat folder so the
      # URLs inside plugins.json (which assume a flat layout) actually resolve.
      - name: Stage files for publishing
        run: |
          mkdir -p publish
          cp build/plugins.json publish/
          find . -name "*.cs3" -exec cp {} publish/ \;
          ls -la publish/

      # Publishes the flat "publish" folder to a "builds" branch.
      # Cloudstream is pointed at that branch's raw repo.json / plugins.json.
      - name: Deploy to builds branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: builds
          keep_files: false
