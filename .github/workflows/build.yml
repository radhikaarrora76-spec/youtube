name: Build Cloudstream plugins

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Compiles every provider module into a .cs3 file and generates repo.json
      - name: Build plugins
        run: ./gradlew make makePluginsJson

      # TEMPORARY DEBUG STEP - shows exactly where files land, remove once confirmed
      - name: Show build output structure
        run: find . -name "*.cs3" -o -name "plugins.json" | grep -v node_modules

      # Publishes just the build/ folder (the .cs3 files + repo.json) to a
      # "builds" branch. Cloudstream is pointed at that branch's raw repo.json.
      - name: Deploy to builds branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: builds
          keep_files: false
